name: meta_moto
description: App financeiro para motoboys - controle de ganhos, km e metas
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  sqflite: ^2.3.3+1
  path: ^1.9.0
  path_provider: ^2.1.3
  fl_chart: ^0.68.0
  intl: ^0.19.0
  provider: ^6.1.2
  shared_preferences: ^2.2.3
  pdf: ^3.11.1
  printing: ^5.13.1
  share_plus: ^9.0.0
  flutter_local_notifications: ^17.2.2
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  geolocator: ^12.0.0
  permission_handler: ^11.3.1
  flutter_overlay_window: ^0.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
