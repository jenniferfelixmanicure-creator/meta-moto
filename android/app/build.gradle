plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

// ── Lê key.properties gerado pelo CI (ou local) ──────────────────────────
def keystorePropertiesFile = rootProject.file("key.properties")
def keystoreProperties = new Properties()
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}

android {
    // namespace movido para manifest para compatibilidade com Gradle 7.4.2
    compileSdk 34
    ndkVersion flutter.ndkVersion

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
    kotlinOptions {
        jvmTarget = "1.8"
    }

    defaultConfig {
        applicationId "com.metamoto.meta_moto"
        minSdk 23
        targetSdk 34
        versionCode 1
        versionName "1.0.0"
        multiDexEnabled true
    }

    // ── Configuração de assinatura ────────────────────────────────────────
    signingConfigs {
        release {
            storeFile     keystorePropertiesFile.exists() ? file(keystoreProperties['storeFile']) : null
            storePassword keystorePropertiesFile.exists() ? keystoreProperties['storePassword'] : null
            keyAlias      keystorePropertiesFile.exists() ? keystoreProperties['keyAlias'] : null
            keyPassword   keystorePropertiesFile.exists() ? keystoreProperties['keyPassword'] : null
        }
    }

    buildTypes {
        release {
            // Usa assinatura com keystore se key.properties existir,
            // senão usa debug (apenas para build local sem CI)
            signingConfig keystorePropertiesFile.exists()
                ? signingConfigs.release
                : signingConfigs.debug

            minifyEnabled false
            shrinkResources false
            shrinkResources false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
        debug {
            applicationIdSuffix ".debug"
        }
    }
}

flutter {
    source "../.."
}

dependencies {
    implementation "org.jetbrains.kotlin:kotlin-stdlib-jdk7:$kotlin_version"
    implementation 'androidx.multidex:multidex:2.0.1'
}
