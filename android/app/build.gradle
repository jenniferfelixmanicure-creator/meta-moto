plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

android {
    namespace "com.metamoto.meta_moto"
    compileSdk 34
    ndkVersion flutter.ndkVersion

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = "1.8"
    }

    defaultConfig {
        applicationId "com.metamoto.meta_moto"
        minSdk 23           // Android 6.0+ (NotificationListenerService estável)
        targetSdk 34
        versionCode flutter.versionCode
        versionName flutter.versionName

        // Necessário para flutter_overlay_window
        multiDexEnabled true
    }

    buildTypes {
        release {
            signingConfig signingConfigs.debug   // substitua por sua keystore para produção
            minifyEnabled false
            shrinkResources false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
        debug {
            applicationIdSuffix ".debug"
        }
    }
}

flutter {
    source "../.."
}

dependencies {
    implementation "org.jetbrains.kotlin:kotlin-stdlib-jdk7:$kotlin_version"
    // multidex (para dispositivos API < 21, mas boa prática incluir)
    implementation 'androidx.multidex:multidex:2.0.1'
}
