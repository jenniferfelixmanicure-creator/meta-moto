name: Build APK Android

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      profile:
        description: 'Perfil de build'
        required: false
        default: 'preview'
        type: choice
        options:
          - preview
          - production

jobs:
  build:
    name: Gerar APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm

      - name: Instalar dependencias
        run: npm install

      - name: Configurar Expo + EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build APK (preview)
        run: eas build --platform android --profile ${{ github.event.inputs.profile || 'preview' }} --non-interactive

      - name: Link do APK
        run: echo "Acesse expo.dev/accounts/jenniferfelixmanicure-creator/projects/meta-moto/builds para baixar o APK"
