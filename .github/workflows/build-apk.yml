name: Build APK - Meta Moto

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────
      - name: Checkout código
        uses: actions/checkout@v4

      # ── 2. Java 17 ───────────────────────────────────────────────────────
      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # ── 3. Flutter estável ───────────────────────────────────────────────
      - name: Configurar Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.22.x"
          channel: stable
          cache: true

      # ── 4. Dependências ──────────────────────────────────────────────────
      - name: Instalar dependências (flutter pub get)
        run: flutter pub get

      # ── 5. Análise estática ──────────────────────────────────────────────
      - name: Analisar código
        run: flutter analyze --no-fatal-infos
        continue-on-error: true

      # ── 6. Build APK Debug (rápido para PRs) ────────────────────────────
      - name: Build APK Debug
        if: github.event_name == 'pull_request'
        run: flutter build apk --debug

      # ── 7. Build APK Release (push na main) ─────────────────────────────
      - name: Build APK Release
        if: github.event_name != 'pull_request'
        run: |
          flutter build apk --release \
            --no-shrink \
            --no-obfuscate

      # ── 8. Upload APK como artefato ──────────────────────────────────────
      - name: Upload APK Release
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: meta-moto-apk-${{ github.run_number }}
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: Upload APK Debug
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: meta-moto-apk-debug-${{ github.run_number }}
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 7

      # ── 9. Criar Release no GitHub (tag v*) ─────────────────────────────
      - name: Criar GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: build/app/outputs/flutter-apk/app-release.apk
          name: "Meta Moto ${{ github.ref_name }}"
          body: |
            ## Meta Moto ${{ github.ref_name }}

            ### Download
            Baixe o APK abaixo e instale no seu Android (minSdk 23 / Android 6.0+).

            > ⚠️ Habilite "Instalar apps de fontes desconhecidas" nas configurações do Android.

            ### Novidades desta versão
            - Detecção automática de corridas (Uber, 99, iFood, Lalamove, InDrive)
            - Overlay flutuante com valor, km e R$/km em tempo real
            - Alerta de baixa eficiência configurável
            - Rastreamento de km via GPS com fórmula de Haversine
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Job de status ─────────────────────────────────────────────────────────
  notify:
    name: Resumo do Build
    runs-on: ubuntu-latest
    needs: build
    if: always()
    steps:
      - name: Resultado
        run: |
          if [ "${{ needs.build.result }}" = "success" ]; then
            echo "✅ APK gerado com sucesso! Acesse a aba Actions > Artifacts para baixar."
          else
            echo "❌ Build falhou. Verifique os logs acima para detalhes."
          fi
