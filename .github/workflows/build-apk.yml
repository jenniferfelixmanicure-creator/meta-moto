name: Build APK - Meta Moto

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    name: Build Release APK (Signed)
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────
      - name: Checkout código
        uses: actions/checkout@v4

      # ── 2. Java 17 ───────────────────────────────────────────────────────
      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # ── 3. Flutter estável ───────────────────────────────────────────────
      - name: Configurar Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.22.x"
          channel: stable
          cache: true

      # ── 4. Restore keystore do secret ────────────────────────────────────
      - name: Restaurar Keystore de assinatura
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/keystore.p12
          echo "✅ keystore.p12 restaurado ($(wc -c < android/app/keystore.p12) bytes)"

      # ── 5. Criar key.properties para o Gradle ────────────────────────────
      - name: Criar key.properties
        run: |
          cat > android/key.properties <<EOF
          storePassword=${{ secrets.STORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=keystore.p12
          EOF
          echo "✅ key.properties criado"

      # ── 6. Dependências Flutter ──────────────────────────────────────────
      - name: flutter pub get
        run: flutter pub get

      # ── 7. Análise estática ──────────────────────────────────────────────
      - name: Analisar código
        run: flutter analyze --no-fatal-infos
        continue-on-error: true

      # ── 8. Build APK Debug (PRs) ─────────────────────────────────────────
      - name: Build APK Debug
        if: github.event_name == 'pull_request'
        run: flutter build apk --debug

      # ── 9. Build APK Release ASSINADO (push na main / tags) ──────────────
      - name: Build APK Release (assinado)
        if: github.event_name != 'pull_request'
        env:
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: |
          flutter build apk --release \
            --no-shrink \
            --no-obfuscate

      # ── 10. Verifica assinatura do APK ────────────────────────────────────
      - name: Verificar assinatura
        if: github.event_name != 'pull_request'
        run: |
          APK=build/app/outputs/flutter-apk/app-release.apk
          echo "Tamanho: $(du -sh $APK | cut -f1)"
          # Verifica se o APK foi assinado corretamente
          $JAVA_HOME/bin/jarsigner -verify -verbose -certs "$APK" 2>&1 | grep -E "jar verified|smk|WARNING" || true

      # ── 11. Upload APK como artefato ──────────────────────────────────────
      - name: Upload APK Release (assinado)
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: MetaMoto-v${{ github.run_number }}-signed
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: Upload APK Debug
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: MetaMoto-debug-${{ github.run_number }}
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 7

      # ── 12. GitHub Release (tag v*) ───────────────────────────────────────
      - name: Criar GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: build/app/outputs/flutter-apk/app-release.apk
          name: "Meta Moto ${{ github.ref_name }}"
          body: |
            ## 🏍️ Meta Moto ${{ github.ref_name }}

            ### 📥 Instalação
            1. Baixe o **app-release.apk** abaixo
            2. No Android: **Configurações → Segurança → Fontes desconhecidas** → Ativar
            3. Abra o arquivo APK baixado e instale
            4. Na primeira abertura, conceda as 3 permissões solicitadas

            ### ✅ APK assinado digitalmente
            Este APK foi assinado com o keystore oficial do Meta Moto.

            ### 📱 Requisitos
            - Android 6.0+ (API 23)
            - 50 MB de espaço livre

            ### 🆕 Funcionalidades
            - Detecção automática de corridas (Uber, 99, iFood, Lalamove, InDrive)
            - Overlay flutuante com valor, km e R$/km em tempo real
            - Alerta de baixa eficiência configurável
            - Rastreamento de km via GPS
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  notify:
    name: Resumo do Build
    runs-on: ubuntu-latest
    needs: build
    if: always()
    steps:
      - name: Resultado
        run: |
          if [ "${{ needs.build.result }}" = "success" ]; then
            echo "✅ APK ASSINADO gerado! Acesse Actions > Artifacts para baixar."
            echo "Para criar uma release pública: git tag v1.0.0 && git push origin v1.0.0"
          else
            echo "❌ Build falhou. Verifique os logs acima."
          fi
