name: Build APK - Meta Moto

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    name: Build Release APK (Signed)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Configurar Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.22.x"
          channel: stable
          cache: true

      # ── Restaura keystore do secret ───────────────────────────────────────
      - name: Restaurar Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/keystore.p12
          echo "keystore: $(wc -c < android/app/keystore.p12) bytes"

      - name: Criar key.properties
        run: |
          cat > android/key.properties << 'EOF'
          storePassword=${{ secrets.STORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=keystore.p12
          EOF

      # ── Dependências ──────────────────────────────────────────────────────
      - name: flutter pub get
        run: flutter pub get

      # ── FIX CRÍTICO: remove android.enableR8 injetado por plugins legados ─
      # O flutter_overlay_window (e outros plugins antigos) injeta esta opção
      # no cache do pub. O AGP 8.x a considera inválida e aborta o build.
      - name: Remover android.enableR8 de todos os gradle.properties
        run: |
          echo "=== Antes da remoção ==="
          grep -r "android.enableR8" ~/.pub-cache/ android/ 2>/dev/null || echo "Não encontrado"
          sed -i '/android\.enableR8/d' ~/.pub-cache/hosted/pub.dev/flutter_overlay_window-*/android/gradle.properties 2>/dev/null || true
          find . ~/.pub-cache/ -name "gradle.properties" -exec sed -i '/android\.enableR8/d' {} \; 2>/dev/null || true
          echo "=== Verificação após remoção ==="
          grep -r "android.enableR8" ~/.pub-cache/ android/ 2>/dev/null && echo "AINDA PRESENTE!" || echo "Removido com sucesso"

      # ── Análise (não bloqueia build) ─────────────────────────────────────
      - name: flutter analyze
        run: flutter analyze --no-fatal-infos
        continue-on-error: true

      # ── Build APK Debug (PRs) ─────────────────────────────────────────────
      - name: Build APK Debug
        if: github.event_name == 'pull_request'
        run: flutter build apk --debug

      # ── Build APK Release ASSINADO ────────────────────────────────────────
      - name: Build APK Release (assinado)
        if: github.event_name != 'pull_request'
        run: flutter build apk --release --no-shrink --no-obfuscate

      # ── Verifica assinatura ───────────────────────────────────────────────
      - name: Verificar assinatura do APK
        if: github.event_name != 'pull_request'
        run: |
          APK=build/app/outputs/flutter-apk/app-release.apk
          SIZE=$(du -sh "$APK" | cut -f1)
          echo "APK gerado: $SIZE"
          $JAVA_HOME/bin/jarsigner -verify -verbose -certs "$APK" 2>&1 | grep -E "jar verified|WARNING" || true

      # ── Upload artefato (30 dias) ─────────────────────────────────────────
      - name: Upload APK Release
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: MetaMoto-v${{ github.run_number }}-signed
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: Upload APK Debug
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: MetaMoto-debug-${{ github.run_number }}
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 7

      # ── GitHub Release (tags v*) ──────────────────────────────────────────
      - name: Criar GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: build/app/outputs/flutter-apk/app-release.apk
          name: "Meta Moto ${{ github.ref_name }}"
          body: |
            ## 🏍️ Meta Moto ${{ github.ref_name }}

            ### 📥 Como instalar
            1. Baixe o **app-release.apk** abaixo
            2. No Android: Configurações → Segurança → **Fontes desconhecidas** → Ativar
            3. Abra o APK e instale

            ### ✅ APK assinado digitalmente

            ### 📱 Requisitos
            - Android 6.0+ (API 23)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  notify:
    name: Resumo
    runs-on: ubuntu-latest
    needs: build
    if: always()
    steps:
      - run: |
          if [ "${{ needs.build.result }}" = "success" ]; then
            echo "✅ APK assinado gerado! Aba Actions > Artifacts para baixar."
          else
            echo "❌ Build falhou. Veja os logs acima."
          fi
