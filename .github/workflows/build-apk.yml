name: Build APK Android

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      profile:
        description: 'Perfil de build'
        required: false
        default: 'preview'
        type: choice
        options:
          - preview
          - production

jobs:
  build:
    name: Gerar APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm

      - name: Instalar dependencias
        run: npm install

      - name: Configurar Expo + EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build APK no EAS (aguarda conclusao)
        run: |
          eas build \
            --platform android \
            --profile ${{ github.event.inputs.profile || 'preview' }} \
            --non-interactive \
            --json \
            2>/tmp/eas_stderr.log \
            > /tmp/eas_output.json
          echo "=== JSON de saida do EAS ==="
          cat /tmp/eas_output.json
          echo ""
          echo "=== Ultimas linhas do log EAS ==="
          tail -20 /tmp/eas_stderr.log

      - name: Extrair URL e baixar APK
        run: |
          APK_URL=$(jq -r \
            '(if type=="array" then .[0] else . end) | .artifacts.buildUrl // .artifacts.applicationArchiveUrl // ""' \
            /tmp/eas_output.json 2>/dev/null)

          if [ -z "$APK_URL" ] || [ "$APK_URL" = "null" ]; then
            echo "URL nao encontrada no output direto, tentando eas build:list..."
            eas build:list \
              --platform android \
              --limit 1 \
              --json \
              --non-interactive \
              2>/dev/null \
              > /tmp/eas_list.json
            echo "=== build:list output ==="
            cat /tmp/eas_list.json
            APK_URL=$(jq -r \
              '.[0].artifacts.buildUrl // .[0].artifacts.applicationArchiveUrl // ""' \
              /tmp/eas_list.json 2>/dev/null)
          fi

          echo "URL do APK: $APK_URL"

          if [ -z "$APK_URL" ] || [ "$APK_URL" = "null" ]; then
            echo "ERRO: nao foi possivel encontrar a URL do APK"
            exit 1
          fi

          curl -L --retry 3 "$APK_URL" -o meta-moto.apk
          ls -lh meta-moto.apk

      - name: Publicar APK como artefato do GitHub
        uses: actions/upload-artifact@v4
        with:
          name: meta-moto-apk-${{ github.run_number }}
          path: meta-moto.apk
          retention-days: 30
