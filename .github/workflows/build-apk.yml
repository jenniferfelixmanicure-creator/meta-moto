name: Build APK Android

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      profile:
        description: 'Perfil de build'
        required: false
        default: 'preview'
        type: choice
        options:
          - preview
          - production

jobs:
  build:
    name: Gerar APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm

      - name: Instalar dependencias
        run: npm install

      - name: Configurar Expo + EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build APK no EAS (aguarda conclusao)
        run: |
          eas build \
            --platform android \
            --profile ${{ github.event.inputs.profile || 'preview' }} \
            --non-interactive \
            2>&1 | tee /tmp/eas_build.log
          echo "EXIT_CODE=${PIPESTATUS[0]}" >> $GITHUB_ENV

      - name: Verificar resultado do build
        run: |
          echo "=== Log do EAS Build ==="
          cat /tmp/eas_build.log
          if [ "${EXIT_CODE}" != "0" ]; then
            echo "Build EAS falhou com exit code ${EXIT_CODE}"
            exit 1
          fi

      - name: Extrair URL e baixar APK
        run: |
          APK_URL=$(grep -oE 'https://[^ ]+\.(apk|zip)' /tmp/eas_build.log | tail -1)

          if [ -z "$APK_URL" ]; then
            echo "URL nao encontrada no log, tentando eas build:list..."
            eas build:list \
              --platform android \
              --limit 1 \
              --json \
              --non-interactive \
              2>/tmp/list_stderr.log \
              > /tmp/eas_list.json
            cat /tmp/eas_list.json
            APK_URL=$(node -e "
              try {
                const d = require('fs').readFileSync('/tmp/eas_list.json','utf8').trim();
                const arr = JSON.parse(d);
                const url = (arr[0]?.artifacts?.buildUrl) || (arr[0]?.artifacts?.applicationArchiveUrl) || '';
                console.log(url);
              } catch(e) { console.log(''); }
            ")
          fi

          echo "URL do APK: $APK_URL"

          if [ -z "$APK_URL" ] || [ "$APK_URL" = "null" ]; then
            echo "ERRO: nao foi possivel encontrar a URL do APK"
            cat /tmp/eas_build.log
            exit 1
          fi

          curl -L --retry 3 "$APK_URL" -o meta-moto.apk
          ls -lh meta-moto.apk

      - name: Publicar APK como artefato do GitHub
        uses: actions/upload-artifact@v4
        with:
          name: meta-moto-apk-${{ github.run_number }}
          path: meta-moto.apk
          retention-days: 30
