name: Build APK - Meta Moto

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      version:
        description: 'Versão do APK (ex: 1.2.0)'
        required: false
        default: ''

# ─────────────────────────────────────────────────────────────────────────────
# SECRETS NECESSÁRIOS (GitHub → Settings → Secrets → Actions):
#
#   KEYSTORE_BASE64   → Conteúdo do keystore.jks em base64
#                       Na primeira execução sem secrets, o workflow gera o
#                       keystore e faz upload como artefato. Baixe, encode em
#                       base64 e salve como KEYSTORE_BASE64.
#                       Comando: base64 -w 0 keystore.jks
#
#   STORE_PASSWORD    → Senha do keystore (você define)
#   KEY_PASSWORD      → Senha da chave  (você define)
#   KEY_ALIAS         → Alias da chave  (padrão: metamoto)
#
# ─────────────────────────────────────────────────────────────────────────────

jobs:
  build:
    name: Build APK Assinado
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout código
        uses: actions/checkout@v4

      # ── 2. Java 17 ───────────────────────────────────────────────────────────
      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # ── 3. Flutter ───────────────────────────────────────────────────────────
      - name: Configurar Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.x'
          channel: stable
          cache: true

      # ── 4. Keystore: geração automática na 1ª vez, ou restauração do secret ─
      - name: Configurar Keystore
        id: keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          ALIAS="${KEY_ALIAS:-metamoto}"
          STORE_PASS="${STORE_PASSWORD:-MetaMoto@2025!}"
          KEY_PASS="${KEY_PASSWORD:-MetaMoto@2025!}"

          if [ -n "$KEYSTORE_BASE64" ]; then
            # ── Restaura keystore existente ──────────────────────────────────
            echo "$KEYSTORE_BASE64" | base64 --decode > android/app/keystore.jks
            echo "✅ Keystore restaurado do secret ($(wc -c < android/app/keystore.jks) bytes)"
            echo "mode=secret" >> $GITHUB_OUTPUT
          else
            # ── Gera novo keystore (somente na 1ª vez) ───────────────────────
            echo "⚠️  KEYSTORE_BASE64 não configurado. Gerando novo keystore..."
            keytool -genkeypair \
              -v \
              -keystore android/app/keystore.jks \
              -storetype JKS \
              -alias "$ALIAS" \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -storepass "$STORE_PASS" \
              -keypass "$KEY_PASS" \
              -dname "CN=Meta Moto, OU=Mobile, O=MetaMoto, L=Rio de Janeiro, ST=RJ, C=BR"

            echo "✅ Keystore gerado!"
            echo "mode=generated" >> $GITHUB_OUTPUT

            # Salva base64 para o usuário poder configurar o secret
            base64 -w 0 android/app/keystore.jks > /tmp/keystore_base64.txt
            echo ""
            echo "══════════════════════════════════════════════════════════════"
            echo "  AÇÃO NECESSÁRIA — salve os secrets abaixo no GitHub:"
            echo "══════════════════════════════════════════════════════════════"
            echo ""
            echo "  GitHub → Settings → Secrets → Actions → New repository secret"
            echo ""
            echo "  KEYSTORE_BASE64 = (veja o artefato 'keystore-base64' desta execução)"
            echo "  STORE_PASSWORD  = $STORE_PASS"
            echo "  KEY_PASSWORD    = $KEY_PASS"
            echo "  KEY_ALIAS       = $ALIAS"
            echo ""
            echo "  Após salvar os secrets, re-execute este workflow para gerar"
            echo "  o APK assinado definitivo (mesma chave, atualizações funcionam)."
            echo "══════════════════════════════════════════════════════════════"
          fi

          # Escreve key.properties para o Gradle
          cat > android/key.properties << EOF
          storePassword=${STORE_PASS}
          keyPassword=${KEY_PASS}
          keyAlias=${ALIAS}
          storeFile=keystore.jks
          EOF

      # ── 5. Upload do keystore base64 (somente se gerado agora) ──────────────
      - name: Upload Keystore Base64 (1ª vez)
        if: steps.keystore.outputs.mode == 'generated'
        uses: actions/upload-artifact@v4
        with:
          name: keystore-base64-SALVE-COMO-SECRET
          path: /tmp/keystore_base64.txt
          retention-days: 7

      # ── 6. Dependências ──────────────────────────────────────────────────────
      - name: flutter pub get
        run: flutter pub get

      # ── 7. Fix: remove android.enableR8 (plugins legados) ───────────────────
      - name: Remover android.enableR8 de gradle.properties legados
        run: |
          find . ~/.pub-cache/ -name "gradle.properties" \
            -exec sed -i '/android\.enableR8/d' {} \; 2>/dev/null || true
          echo "✅ Fix enableR8 aplicado"

      # ── 7b. Fix: geolocator_android flutter.compileSdkVersion ────────────────
      - name: Fix geolocator_android compileSdkVersion
        run: |
          # geolocator_android ≤ 4.6.x usa flutter.compileSdkVersion no build.gradle
          # do subprojeto, onde a extensão 'flutter' não existe — substitui por 34
          find ~/.pub-cache -name "build.gradle" -path "*geolocator_android*" \
            -print0 | xargs -0 -I{} sh -c '
              sed -i \
                "s/flutter\.compileSdkVersion/34/g;
                 s/flutter\.targetSdkVersion/34/g;
                 s/flutter\.minSdkVersion/23/g" {}
              echo "✅ Patched: {}"
            ' 2>/dev/null || true
          # Aplica o mesmo fix em qualquer outro plugin com o mesmo problema
          find ~/.pub-cache -name "build.gradle" -path "*pub.dev*" \
            -exec grep -l "flutter\.compileSdkVersion" {} \; 2>/dev/null \
            | xargs -I{} sh -c '
              sed -i "s/flutter\.compileSdkVersion/34/g" {}
              echo "✅ Extra patched: {}"
            ' 2>/dev/null || true

      # ── 8. Versão dinâmica (workflow_dispatch com versão manual) ─────────────
      - name: Definir versão do app
        run: |
          VERSION="${{ github.event.inputs.version }}"
          if [ -n "$VERSION" ]; then
            # Atualiza pubspec.yaml com a versão informada
            BUILD_NUM=${{ github.run_number }}
            sed -i "s/^version: .*/version: ${VERSION}+${BUILD_NUM}/" pubspec.yaml
            echo "📦 Versão definida: ${VERSION}+${BUILD_NUM}"
          else
            echo "📦 Usando versão do pubspec.yaml"
          fi

      # ── 9. Análise estática (não bloqueia build) ─────────────────────────────
      - name: flutter analyze
        run: flutter analyze --no-fatal-infos
        continue-on-error: true

      # ── 10. Build APK Release Assinado ───────────────────────────────────────
      - name: Build APK Release (assinado)
        run: |
          flutter build apk \
            --release \
            --no-shrink \
            --no-obfuscate \
            --build-number=${{ github.run_number }}

      # ── 11. Verifica assinatura e tamanho ────────────────────────────────────
      - name: Verificar APK
        run: |
          APK="build/app/outputs/flutter-apk/app-release.apk"
          SIZE=$(du -sh "$APK" | cut -f1)
          echo "📦 APK size: $SIZE"
          $JAVA_HOME/bin/jarsigner -verify -verbose -certs "$APK" 2>&1 \
            | grep -E "jar verified|WARNING|smk" | head -5 || true

      # ── 12. Renomeia APK com versão e número do build ─────────────────────────
      - name: Renomear APK
        run: |
          VERSION=$(grep "^version:" pubspec.yaml | sed 's/version: //' | cut -d'+' -f1)
          BUILD=${{ github.run_number }}
          mkdir -p dist
          cp build/app/outputs/flutter-apk/app-release.apk \
             dist/MetaMoto-v${VERSION}-build${BUILD}.apk
          echo "✅ APK: MetaMoto-v${VERSION}-build${BUILD}.apk"
          echo "APK_NAME=MetaMoto-v${VERSION}-build${BUILD}" >> $GITHUB_ENV

      # ── 13. Upload APK como artefato (30 dias) ────────────────────────────────
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APK_NAME }}
          path: dist/*.apk
          retention-days: 30

      # ── 14. GitHub Release (ao criar tag vX.X.X) ─────────────────────────────
      - name: Criar GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.apk
          name: 'Meta Moto ${{ github.ref_name }}'
          body: |
            ## 🏍️ Meta Moto ${{ github.ref_name }}

            ### 📥 Como instalar no celular
            1. Baixe o arquivo **MetaMoto-*.apk** abaixo
            2. No Android: **Configurações → Segurança → Fontes desconhecidas → Ativar**
            3. Abra o arquivo APK e instale
            4. Se for Xiaomi/MIUI: **Configurações → Apps → Meta Moto → Permissões → Notificações → Permitir**

            ### ✅ APK assinado digitalmente
            > Compatível com Xiaomi / MIUI, Samsung e todos os Android 8.0+

            ### 📱 Requisitos mínimos
            - Android 8.0+ (API 26)
            - 50 MB de espaço livre
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Resumo final ─────────────────────────────────────────────────────────────
  summary:
    name: Resumo do Build
    runs-on: ubuntu-latest
    needs: build
    if: always()
    steps:
      - name: Resultado
        run: |
          if [ "${{ needs.build.result }}" = "success" ]; then
            echo ""
            echo "╔══════════════════════════════════════════════════════╗"
            echo "║  ✅  APK gerado com sucesso!                         ║"
            echo "║                                                      ║"
            echo "║  GitHub → Actions → este workflow → Artifacts        ║"
            echo "║  Baixe o arquivo MetaMoto-v*.apk                     ║"
            echo "╚══════════════════════════════════════════════════════╝"
          else
            echo ""
            echo "╔══════════════════════════════════════════════════════╗"
            echo "║  ❌  Build falhou. Veja os logs acima.               ║"
            echo "╚══════════════════════════════════════════════════════╝"
          fi
